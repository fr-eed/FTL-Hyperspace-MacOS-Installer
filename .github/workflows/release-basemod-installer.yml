name: Release Basemod Installer

on:
  workflow_call:
    inputs:
      release-tag:
        description: 'GitHub release tag to attach DMGs to'
        required: false
        type: string
  workflow_dispatch:
    inputs:
      release-tag:
        description: 'GitHub release tag to attach DMGs to'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x86_64, arm64]
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Retrieve Hyperspace basemod version (from .deps-versions)
        id: basemod-version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RAW_VERSION=$(grep 'HYPERSPACE_VERSION' .deps-versions | cut -d'"' -f2)
          HYPERSPACE_VERSION=$(./scripts/utils/resolve-hyperspace-version.sh "$RAW_VERSION")
          echo "HYPERSPACE_VERSION=$HYPERSPACE_VERSION" >> $GITHUB_OUTPUT

      - name: Build installer for ${{ matrix.arch }}
        id: build
        uses: fr-eed/hyperspace-installer-mac/actions/build-installer@main
        with:
          arch: ${{ matrix.arch }}
          installer-bundle-version: ${{ steps.basemod-version.outputs.HYPERSPACE_VERSION }}
          hyperspace-version: ${{ steps.basemod-version.outputs.HYPERSPACE_VERSION }}
          installer-name: "Hyperspace"

      - name: Upload DMG to release
        if: inputs.release-tag != ''
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.release-tag }}
          files: ${{ steps.build.outputs.dmg-path }}
